version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: ejournal_mysql_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
    networks:
      - ejournal_network_dev

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: ejournal_pma_dev
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8099:80"
    networks:
      - ejournal_network_dev

  web:
    # Langsung menggunakan image node tanpa perlu Dockerfile
    image: node:22-alpine
    container_name: ejournal_nextjs_dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      # Mount seluruh folder proyek saat ini ke dalam folder /app di container
      - .:/app
      # Lindungi node_modules dan .next agar tidak bentrok dengan OS Windows
      - /app/node_modules
      - /app/.next
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    # Jalankan instalasi, generate prisma, dan jalankan server development
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      - db
    networks:
      - ejournal_network_dev

volumes:
  db_data_dev:

networks:
  ejournal_network_dev:
    driver: bridge
